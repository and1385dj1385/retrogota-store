<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>RETROGOTA</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --black:#0A0A0A;--carbon:#1A1A1A;--gold:#C9A84C;--gold-light:#E2C97E;
  --ivory:#F5F0E8;--grey:#6B6B6B;--grey-light:#3A3A3A;
  --nequi:#7B2D8B;--nequi-light:#A44FC0;
  --whatsapp:#25D366;--whatsapp-dark:#128C7E;
  --success:#2D8B5A;--danger:#C0392B;
  --radius:14px;--radius-sm:8px;--radius-lg:20px;
}
html,body{height:100%;}
body{background:var(--black);color:var(--ivory);font-family:'Inter',sans-serif;overflow-x:hidden;}

/* ── PAGES ── */
.page{display:none;min-height:100vh;}
.page.active{display:flex;flex-direction:column;animation:fadeIn .4s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── LANDING ── */
#page-landing{
  position:relative;align-items:center;justify-content:center;text-align:center;
  background:url('https://images.unsplash.com/photo-1529139574466-a303027c1d8b?w=1800&q=90') center/cover no-repeat;
}
.landing-overlay{position:absolute;inset:0;background:linear-gradient(160deg,rgba(10,10,10,.72) 0%,rgba(10,10,10,.85) 100%);z-index:0;}
.landing-inner{position:relative;z-index:1;padding:40px 24px;}
.landing-logo{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(60px,13vw,170px);
  font-weight:700;letter-spacing:.06em;
  color:var(--ivory);text-transform:uppercase;line-height:1;margin-bottom:10px;
}
.landing-logo em{font-style:italic;color:var(--gold);}
.landing-tagline{
  font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.35em;
  color:rgba(245,240,232,.38);text-transform:uppercase;margin-bottom:56px;
}
.landing-buttons{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;}

/* BIG LANDING BUTTONS */
.land-btn{
  display:flex;flex-direction:column;align-items:center;gap:7px;
  text-decoration:none;cursor:pointer;border:none;background:none;
  padding:32px 52px;min-width:230px;
  transition:all .3s cubic-bezier(.4,0,.2,1);
  border-radius:var(--radius-lg);
}
.land-btn-new{background:var(--gold);}
.land-btn-new:hover{background:var(--gold-light);transform:translateY(-4px);box-shadow:0 20px 50px rgba(201,168,76,.3);}
.land-btn-second{border:1.5px solid rgba(245,240,232,.35);}
.land-btn-second:hover{border-color:var(--ivory);background:rgba(245,240,232,.07);transform:translateY(-4px);}
.land-btn-eyebrow{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.28em;text-transform:uppercase;}
.land-btn-new .land-btn-eyebrow{color:rgba(10,10,10,.55);}
.land-btn-second .land-btn-eyebrow{color:var(--gold);}
.land-btn-title{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;letter-spacing:.03em;}
.land-btn-new .land-btn-title{color:var(--black);}
.land-btn-second .land-btn-title{color:var(--ivory);}
.land-btn-sub{font-family:'Inter',sans-serif;font-size:11px;}
.land-btn-new .land-btn-sub{color:rgba(10,10,10,.45);}
.land-btn-second .land-btn-sub{color:var(--grey);}

/* ── SHOP NAV ── */
.shop-nav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 40px;
  background:rgba(10,10,10,.96);backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(201,168,76,.12);
}
.shop-nav-logo{
  font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;
  letter-spacing:.25em;color:var(--gold);text-transform:uppercase;
  cursor:pointer;text-decoration:none;
}
.shop-nav-right{display:flex;align-items:center;gap:10px;}

/* BUTTONS — rounded system */
.btn{
  font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;
  text-transform:uppercase;cursor:pointer;border:none;
  transition:all .25s;border-radius:var(--radius-sm);
  display:inline-flex;align-items:center;gap:6px;
}
.btn-gold{background:var(--gold);color:var(--black);padding:10px 22px;}
.btn-gold:hover{background:var(--gold-light);}
.btn-outline{background:none;border:1.5px solid rgba(201,168,76,.3);color:var(--gold);padding:10px 22px;}
.btn-outline:hover{background:var(--gold);color:var(--black);border-color:var(--gold);}
.btn-ghost{background:none;border:1.5px solid rgba(245,240,232,.2);color:var(--grey);padding:10px 22px;}
.btn-ghost:hover{border-color:var(--ivory);color:var(--ivory);}
.btn-lg{padding:15px 32px;font-size:11px;border-radius:var(--radius);}
.btn-full{width:100%;justify-content:center;}

/* CART BUTTON */
.cart-btn{
  position:relative;background:none;border:1.5px solid rgba(201,168,76,.3);
  color:var(--ivory);padding:10px 18px;cursor:pointer;
  font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;
  transition:all .25s;display:flex;align-items:center;gap:7px;
  border-radius:var(--radius-sm);
}
.cart-btn:hover{border-color:var(--gold);color:var(--gold);}
.cart-badge{
  position:absolute;top:-8px;right:-8px;background:var(--gold);
  color:var(--black);font-size:9px;font-weight:700;
  width:19px;height:19px;border-radius:50%;
  display:none;align-items:center;justify-content:center;
}
.cart-badge.show{display:flex;animation:bump .3s ease;}
@keyframes bump{0%,100%{transform:scale(1)}50%{transform:scale(1.45)}}

/* ── SHOP HEADER ── */
.shop-header{padding:56px 40px 44px;background:var(--carbon);border-bottom:1px solid rgba(201,168,76,.1);}
.shop-eyebrow{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin-bottom:10px;}
.shop-title{font-family:'Cormorant Garamond',serif;font-size:clamp(38px,6vw,76px);font-weight:300;line-height:1;}
.shop-title em{font-style:italic;color:var(--gold);}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:36px;}
.filter-btn{
  font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.2em;
  text-transform:uppercase;background:none;
  border:1.5px solid rgba(201,168,76,.18);color:var(--grey);
  padding:8px 18px;cursor:pointer;transition:all .2s;
  border-radius:100px;
}
.filter-btn:hover{border-color:var(--gold);color:var(--gold);}
.filter-btn.active{background:var(--gold);color:var(--black);border-color:var(--gold);}

/* ── PRODUCTS ── */
.products-section{padding:52px 40px;background:var(--black);flex:1;}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:20px;}
.product-card{cursor:pointer;border-radius:var(--radius);overflow:hidden;background:var(--carbon);transition:transform .3s,box-shadow .3s;}
.product-card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,.5);}
.product-card.hidden{display:none;}
.product-img{aspect-ratio:3/4;background:var(--grey-light);overflow:hidden;position:relative;}
.product-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.product-card:hover .product-img img{transform:scale(1.06);}
.product-badge{
  position:absolute;top:14px;left:14px;
  font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.2em;text-transform:uppercase;
  background:var(--gold);color:var(--black);padding:5px 11px;border-radius:100px;
}
.product-cat-tag{
  position:absolute;bottom:14px;right:14px;
  font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.18em;text-transform:uppercase;
  background:rgba(10,10,10,.7);color:rgba(245,240,232,.45);padding:4px 9px;border-radius:100px;
  backdrop-filter:blur(4px);
}
.product-info{padding:16px 18px 18px;}
.product-brand{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;margin-bottom:4px;}
.product-name{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;margin-bottom:3px;line-height:1.2;}
.product-sub{font-size:11px;color:var(--grey);margin-bottom:14px;font-style:italic;}
.product-footer{display:flex;justify-content:space-between;align-items:center;}
.product-price{font-family:'Space Mono',monospace;font-size:13px;color:var(--ivory);}
.add-cart-btn{
  background:var(--gold);color:var(--black);
  font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.15em;text-transform:uppercase;
  padding:8px 14px;cursor:pointer;transition:all .2s;border:none;border-radius:100px;
}
.add-cart-btn:hover{background:var(--gold-light);}


/* ── SIZE SELECTOR ── */
.size-selector{margin-bottom:14px;}
.size-label{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.2em;color:var(--grey);text-transform:uppercase;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;}
.size-label span{color:var(--grey-light);}
.size-options{display:flex;gap:6px;flex-wrap:wrap;}
.size-btn{
  font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.08em;
  background:rgba(255,255,255,.04);border:1.5px solid rgba(245,240,232,.12);
  color:var(--grey);padding:6px 13px;cursor:pointer;
  border-radius:8px;transition:all .2s;user-select:none;
  position:relative;
}
.size-btn:hover:not(.sold-out){border-color:var(--gold);color:var(--gold);}
.size-btn.selected{background:var(--gold);border-color:var(--gold);color:var(--black);font-weight:700;}
.size-btn.sold-out{opacity:.3;cursor:not-allowed;text-decoration:line-through;}
.size-btn:active:not(.sold-out){transform:scale(.92);}
.size-required{
  font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.15em;
  color:var(--danger);text-transform:uppercase;margin-top:6px;
  display:none;
}
.size-required.show{display:block;animation:shake .3s ease;}

/* ── COMING SOON CARD ── */
.coming-soon-img{
  aspect-ratio:3/4;background:var(--black);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  border:1.5px dashed rgba(201,168,76,.12);
}
.coming-soon-icon{font-size:28px;opacity:.15;}
.coming-soon-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.25em;color:var(--grey-light);text-transform:uppercase;}

/* ── CART DRAWER ── */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:300;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(6px);}
.cart-overlay.open{opacity:1;pointer-events:all;}
.cart-drawer{
  position:fixed;top:0;right:0;bottom:0;width:420px;max-width:100vw;
  background:var(--carbon);z-index:301;
  transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  border-left:1px solid rgba(201,168,76,.12);
  border-radius:var(--radius-lg) 0 0 var(--radius-lg);
}
.cart-drawer.open{transform:translateX(0);}
.cart-header{padding:22px 26px;border-bottom:1px solid rgba(201,168,76,.1);display:flex;justify-content:space-between;align-items:center;}
.cart-header h3{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;}
.cart-close{background:none;border:none;color:var(--grey);cursor:pointer;font-size:22px;line-height:1;transition:color .2s;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.cart-close:hover{color:var(--ivory);background:rgba(255,255,255,.06);}
.cart-items{flex:1;overflow-y:auto;padding:18px 26px;display:flex;flex-direction:column;gap:12px;}
.cart-items::-webkit-scrollbar{width:3px;}
.cart-items::-webkit-scrollbar-thumb{background:var(--gold-dim,#7A6028);border-radius:4px;}
.cart-empty{text-align:center;padding:56px 20px;color:var(--grey);}
.cart-empty-icon{font-size:38px;margin-bottom:14px;opacity:.25;}
.cart-item{display:flex;gap:14px;padding:14px;background:var(--black);border:1px solid rgba(201,168,76,.07);border-radius:var(--radius-sm);animation:slideIn .25s ease;}
@keyframes slideIn{from{opacity:0;transform:translateX(16px)}to{opacity:1;transform:translateX(0)}}
.cart-item-img{width:68px;height:84px;object-fit:cover;flex-shrink:0;background:var(--grey-light);border-radius:var(--radius-sm);}
.cart-item-info{flex:1;min-width:0;}
.cart-item-brand{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin-bottom:3px;}
.cart-item-name{font-family:'Cormorant Garamond',serif;font-size:15px;margin-bottom:6px;line-height:1.2;}
.cart-item-price{font-size:12px;color:var(--grey);}
.cart-item-controls{display:flex;align-items:center;gap:8px;margin-top:10px;}
.qty-btn{background:var(--carbon);border:1px solid rgba(201,168,76,.2);color:var(--ivory);width:26px;height:26px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .2s;border-radius:50%;}
.qty-btn:hover{border-color:var(--gold);color:var(--gold);}
.qty-val{font-family:'Space Mono',monospace;font-size:12px;min-width:18px;text-align:center;}
.cart-item-remove{background:none;border:none;color:var(--grey-light);cursor:pointer;font-size:15px;margin-left:auto;transition:color .2s;}
.cart-item-remove:hover{color:var(--danger);}
.cart-footer{padding:18px 26px;border-top:1px solid rgba(201,168,76,.1);}
.cart-subtotal{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px;}
.cart-subtotal-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.22em;color:var(--grey);text-transform:uppercase;}
.cart-subtotal-val{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:var(--gold);}
.cart-note{font-size:11px;color:var(--grey);margin-bottom:14px;line-height:1.6;}

/* ── PAYMENT MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:400;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(8px);}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--carbon);width:520px;max-width:96vw;max-height:92vh;overflow-y:auto;border:1px solid rgba(201,168,76,.18);border-radius:var(--radius-lg);transform:translateY(24px);transition:transform .3s;}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-header{padding:28px 30px 0;display:flex;justify-content:space-between;align-items:center;}
.modal-header h3{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;}
.modal-close{background:none;border:none;color:var(--grey);cursor:pointer;font-size:22px;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.modal-close:hover{color:var(--ivory);background:rgba(255,255,255,.06);}
.modal-body{padding:22px 30px 30px;}

/* ORDER SUMMARY */
.order-summary-box{background:var(--black);padding:16px 18px;margin-bottom:22px;border:1px solid rgba(201,168,76,.1);border-radius:var(--radius-sm);}
.order-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;}
.order-row span:first-child{color:var(--grey);}
.order-row.total{border-top:1px solid rgba(201,168,76,.15);padding-top:12px;margin-top:8px;}
.order-row.total span:last-child{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--gold);}

/* PAYMENT METHOD CARDS */
.pay-methods-label{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.28em;color:var(--gold);text-transform:uppercase;margin-bottom:14px;}
.pay-methods{display:flex;flex-direction:column;gap:12px;margin-bottom:24px;}
.pay-method-card{
  display:flex;align-items:center;gap:16px;
  padding:18px 20px;border-radius:var(--radius);
  border:2px solid rgba(255,255,255,.08);
  cursor:pointer;transition:all .25s;background:var(--black);
}
.pay-method-card:hover{border-color:rgba(255,255,255,.2);}
.pay-method-card.selected-nequi{border-color:var(--nequi);background:rgba(123,45,139,.08);}
.pay-method-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:16px;flex-shrink:0;}
.pay-method-icon.nequi-icon{background:linear-gradient(135deg,var(--nequi),var(--nequi-light));color:#fff;}
.pay-method-text h4{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--ivory);margin-bottom:3px;}
.pay-method-text p{font-size:11px;color:var(--grey);line-height:1.4;}
.pay-method-radio{margin-left:auto;width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.25);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.pay-method-card.selected-nequi .pay-method-radio{border-color:var(--nequi);}
.pay-method-radio-dot{width:8px;height:8px;border-radius:50%;display:none;}
.pay-method-card.selected-nequi .pay-method-radio-dot{display:block;background:var(--nequi);}

/* WHATSAPP CTA */
.wa-cta-box{
  border-radius:var(--radius);padding:22px 22px;margin-bottom:16px;
  display:none;animation:fadeIn .3s ease;
}
.wa-cta-box.show{display:block;}
.wa-cta-box.nequi-box{background:rgba(123,45,139,.12);border:1.5px solid rgba(123,45,139,.35);}
.wa-cta-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.wa-cta-badge{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.12em;padding:4px 12px;border-radius:100px;font-weight:700;}
.nequi-box .wa-cta-badge{background:var(--nequi);color:#fff;}
.wa-cta-box p{font-size:13px;color:var(--grey);line-height:1.7;margin-bottom:16px;}
.wa-cta-box strong{color:var(--ivory);}
.wa-btn{
  display:flex;align-items:center;justify-content:center;gap:10px;width:100%;
  background:var(--whatsapp);color:#fff;
  font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.18em;text-transform:uppercase;
  padding:15px 24px;border:none;cursor:pointer;
  border-radius:var(--radius);transition:all .25s;text-decoration:none;
}
.wa-btn:hover{background:var(--whatsapp-dark);transform:translateY(-1px);}
.wa-btn svg{width:20px;height:20px;fill:currentColor;flex-shrink:0;}
.wa-btn-sub{display:block;font-size:9px;letter-spacing:.1em;opacity:.75;margin-top:2px;}

/* SUCCESS */
.payment-success{display:none;text-align:center;padding:44px 24px;}
.success-circle{width:72px;height:72px;border-radius:50%;background:rgba(37,211,102,.12);border:2px solid var(--whatsapp);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;}
.success-circle svg{width:32px;height:32px;stroke:var(--whatsapp);fill:none;}
.payment-success h3{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:300;margin-bottom:10px;}
.payment-success p{color:var(--grey);font-size:13px;line-height:1.7;margin-bottom:5px;}
.order-id-badge{font-family:'Space Mono',monospace;font-size:11px;color:var(--gold);letter-spacing:.15em;background:var(--black);padding:8px 18px;display:inline-block;margin:14px 0 22px;border-radius:100px;}

/* ── TOAST ── */
#cartToast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(90px);padding:12px 22px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.15em;z-index:500;transition:transform .35s cubic-bezier(.4,0,.2,1);white-space:nowrap;background:var(--carbon);border:1px solid var(--gold);color:var(--ivory);border-radius:100px;}

/* ══════════════════════════════════════════
   INTERACTION ANIMATIONS
══════════════════════════════════════════ */

/* Ripple on click */
.ripple-host{position:relative;overflow:hidden;}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.22);transform:scale(0);animation:ripple-expand .55s linear;pointer-events:none;}
@keyframes ripple-expand{to{transform:scale(4);opacity:0;}}

/* Landing buttons — shimmer sweep */
.land-btn{overflow:hidden;}
.land-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 38%,rgba(255,255,255,.16) 50%,transparent 62%);transform:translateX(-120%);pointer-events:none;transition:none;}
.land-btn:hover::after{transform:translateX(120%);transition:transform .55s ease;}
.land-btn:active{transform:translateY(-1px) scale(.97) !important;}

/* Gold button — glow + press */
.btn-gold:hover,.land-btn-new:hover{box-shadow:0 0 0 6px rgba(201,168,76,.18),0 10px 30px rgba(201,168,76,.28) !important;}
.btn-gold:active,.land-btn-new:active{transform:scale(.95) !important;box-shadow:0 0 0 2px rgba(201,168,76,.2) !important;}

/* Outline/ghost — press */
.btn-outline:hover{box-shadow:0 0 0 4px rgba(201,168,76,.12);}
.btn-outline:active,.btn-ghost:active,.land-btn-second:active{transform:scale(.95) !important;}

/* Back button — arrow slide */
.back-btn{transition:all .2s ease;overflow:hidden;}
.back-btn:hover{padding-left:26px;letter-spacing:.22em;}
.back-btn:active{transform:scale(.93) !important;}

/* Cart button — shake on item add, press */
@keyframes cart-shake{0%,100%{transform:rotate(0)}20%{transform:rotate(-8deg)}40%{transform:rotate(8deg)}60%{transform:rotate(-4deg)}80%{transform:rotate(4deg)}}
.cart-btn.shake{animation:cart-shake .42s ease;}
.cart-btn:active{transform:scale(.92);}

/* Cart badge — pop */
@keyframes badge-pop{0%,100%{transform:scale(1)}35%{transform:scale(1.65)}70%{transform:scale(.9)}}
.cart-badge.pop{animation:badge-pop .38s cubic-bezier(.4,0,.2,1);}

/* Filter pills — pop on select */
@keyframes pill-pop{0%{transform:scale(1)}45%{transform:scale(1.14)}100%{transform:scale(1)}}
.filter-btn{transition:all .2s cubic-bezier(.4,0,.2,1);}
.filter-btn.active{animation:pill-pop .22s ease;}
.filter-btn:active{transform:scale(.9);}

/* Product card — gold border glow */
.product-card{transition:transform .3s cubic-bezier(.4,0,.2,1),box-shadow .3s;}
.product-card:hover{box-shadow:0 18px 52px rgba(0,0,0,.55),0 0 0 1.5px rgba(201,168,76,.3);}

/* Add to cart — flash + press */
@keyframes btn-flash{0%,100%{background:var(--gold);color:var(--black);}50%{background:#fff5d6;}}
.add-cart-btn.flashing{animation:btn-flash .32s ease;}
.add-cart-btn:active{transform:scale(.88) !important;}

/* Qty controls — bounce */
.qty-btn{transition:all .18s ease;}
.qty-btn:active{transform:scale(1.3) !important;}

/* Remove — spin */
.cart-item-remove{transition:all .2s ease;}
.cart-item-remove:hover{transform:rotate(12deg) scale(1.2);}
.cart-item-remove:active{transform:rotate(20deg) scale(1.05);}

/* Cart checkout — subtle pulse */
@keyframes subtle-pulse{0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,.35);}55%{box-shadow:0 0 0 9px rgba(201,168,76,0);}}
#cartFooter .btn-gold{animation:subtle-pulse 2.2s infinite;}
#cartFooter .btn-gold:hover{animation:none;box-shadow:0 0 0 6px rgba(201,168,76,.18),0 10px 30px rgba(201,168,76,.28);}

/* Modal/cart close — spin */
.modal-close,.cart-close{transition:all .22s ease;}
.modal-close:hover{transform:rotate(90deg);background:rgba(255,255,255,.08);}
.cart-close:hover{transform:rotate(90deg);}

/* Payment method cards — slide in + press */
.pay-method-card{transition:all .26s cubic-bezier(.4,0,.2,1);}
.pay-method-card:active{transform:scale(.97);}
.pay-method-card.selected-nequi{transform:translateX(5px);box-shadow:0 4px 24px rgba(123,45,139,.22);}

/* WhatsApp CTA — bounce in */
@keyframes wa-bounce-in{0%{opacity:0;transform:translateY(14px) scale(.95);}65%{transform:translateY(-4px) scale(1.02);}100%{opacity:1;transform:translateY(0) scale(1);}}
.wa-cta-box.show{animation:wa-bounce-in .38s cubic-bezier(.4,0,.2,1);}
.wa-btn{transition:all .22s ease;}
.wa-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,211,102,.3);}
.wa-btn:active{transform:scale(.96) !important;}

/* Toast — spring slide */
#cartToast{transition:transform .42s cubic-bezier(.34,1.56,.64,1);}


/* ════════════════════════════════════
   ANIMATION SYSTEM
════════════════════════════════════ */

/* ── Ripple ── */
.ripple-host{position:relative;overflow:hidden;}
.ripple{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,.25);
  transform:scale(0);
  animation:ripple-expand .6s cubic-bezier(.4,0,.2,1) forwards;
  pointer-events:none;
}
@keyframes ripple-expand{
  to{transform:scale(4);opacity:0;}
}

/* ── Landing buttons ── */
.land-btn{
  position:relative;overflow:hidden;
}
.land-btn::after{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,0);
  transition:background .3s;
}
.land-btn:active::after{background:rgba(255,255,255,.08);}
.land-btn:active{transform:translateY(-1px) scale(.98);}
.land-btn-new:active{transform:scale(.97);}

/* ── "Add to Cart" button — pop + color sweep ── */
.add-cart-btn{
  position:relative;overflow:hidden;
}
.add-cart-btn::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.18) 50%,transparent 100%);
  transform:translateX(-100%);
  transition:transform 0s;
}
.add-cart-btn:hover::before{
  transform:translateX(100%);
  transition:transform .45s ease;
}
.add-cart-btn:active{
  transform:scale(.93);
  transition:transform .1s;
}
@keyframes cartPop{
  0%{transform:scale(1)}
  40%{transform:scale(1.18)}
  70%{transform:scale(.94)}
  100%{transform:scale(1)}
}
.add-cart-btn.popped{animation:cartPop .35s cubic-bezier(.4,0,.2,1);}

/* ── Cart badge ── */
@keyframes badgeBounce{
  0%{transform:scale(1)}
  30%{transform:scale(1.55)}
  55%{transform:scale(.88)}
  75%{transform:scale(1.18)}
  100%{transform:scale(1)}
}
.cart-badge.bouncing{animation:badgeBounce .5s cubic-bezier(.4,0,.2,1);}

/* ── Cart button ── */
.cart-btn{position:relative;overflow:hidden;}
.cart-btn::after{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:2px;background:var(--gold);
  transform:scaleX(0);transform-origin:left;
  transition:transform .3s ease;
}
.cart-btn:hover::after{transform:scaleX(1);}
.cart-btn:active{transform:scale(.96);}

/* ── Back button ── */
.btn-outline{position:relative;overflow:hidden;}
.btn-outline::before{
  content:'';position:absolute;inset:0;
  background:var(--gold);
  transform:translateX(-101%);
  transition:transform .3s cubic-bezier(.4,0,.2,1);
  z-index:0;border-radius:inherit;
}
.btn-outline:hover::before{transform:translateX(0);}
.btn-outline span,.btn-outline{position:relative;z-index:1;}
.btn-outline:active{transform:scale(.97);}

/* ── Ghost button ── */
.btn-ghost:active{transform:scale(.97);opacity:.8;}

/* ── Gold button ── */
.btn-gold{position:relative;overflow:hidden;}
.btn-gold::after{
  content:'';position:absolute;
  top:50%;left:50%;
  width:0;height:0;
  background:rgba(255,255,255,.2);
  border-radius:50%;
  transform:translate(-50%,-50%);
  transition:width .4s ease,height .4s ease,opacity .4s ease;
  opacity:0;
}
.btn-gold:hover::after{width:200%;height:400%;opacity:1;}
.btn-gold:active{transform:scale(.97);}

/* ── Filter buttons — slide-in indicator ── */
.filter-btn{position:relative;}
.filter-btn::after{
  content:'';position:absolute;bottom:-1px;left:50%;right:50%;
  height:2px;background:var(--gold);
  transition:left .25s ease,right .25s ease;
}
.filter-btn:hover::after{left:20%;right:20%;}
.filter-btn.active::after{left:0;right:0;}
.filter-btn:active{transform:scale(.95);}

/* ── Pay method cards ── */
.pay-method-card{position:relative;overflow:hidden;}
.pay-method-card::after{
  content:'';position:absolute;inset:0;
  background:rgba(255,255,255,.03);
  opacity:0;transition:opacity .2s;
}
.pay-method-card:hover::after{opacity:1;}
.pay-method-card:active{transform:scale(.99);}

/* ── WhatsApp button ── */
.wa-btn{position:relative;overflow:hidden;}
.wa-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 60%);
  opacity:0;transition:opacity .3s;
}
.wa-btn:hover::before{opacity:1;}
.wa-btn:active{transform:scale(.98);}

/* ── Qty buttons ── */
.qty-btn:active{transform:scale(.85);}

/* ── Cart close & modal close ── */
.cart-close:active,.modal-close:active{transform:rotate(90deg) scale(.85);}
.cart-close{transition:color .2s,transform .25s;}
.modal-close{transition:color .2s,transform .25s;}

/* ── Cart item remove ── */
.cart-item-remove:hover{transform:scale(1.2);}
.cart-item-remove:active{transform:scale(.9);}
.cart-item-remove{transition:color .2s,transform .2s;}

/* ── Cart item entry ── */
@keyframes slideIn{
  from{opacity:0;transform:translateX(24px) scale(.97)}
  to{opacity:1;transform:translateX(0) scale(1)}
}

/* ── Product card image overlay on hover ── */
.product-img::after{
  content:'';position:absolute;inset:0;
  background:rgba(201,168,76,.08);
  opacity:0;transition:opacity .4s;
}
.product-card:hover .product-img::after{opacity:1;}

/* ── Shimmer on product badge ── */
.product-badge{
  position:relative;overflow:hidden;
}
.product-badge::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.4) 50%,transparent 100%);
  transform:translateX(-100%);
  animation:shimmer 3s 1.5s infinite;
}
@keyframes shimmer{
  0%{transform:translateX(-100%)}
  40%,100%{transform:translateX(200%)}
}

/* ── Toast slide ── */
#cartToast{
  transition:transform .4s cubic-bezier(.34,1.56,.64,1),opacity .3s;
}

/* ── WA CTA box entrance ── */
@keyframes slideDown{
  from{opacity:0;transform:translateY(-12px)}
  to{opacity:1;transform:translateY(0)}
}
.wa-cta-box.show{animation:slideDown .35s cubic-bezier(.4,0,.2,1);}

/* ── Page transition ── */
@keyframes fadeIn{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── Landing logo pulse ── */
@keyframes logoPulse{
  0%,100%{text-shadow:0 0 0 rgba(201,168,76,0)}
  50%{text-shadow:0 0 40px rgba(201,168,76,.25)}
}
.landing-logo{animation:logoPulse 4s ease-in-out infinite;}

/* ── Scroll indicator on landing ── */
.scroll-hint{
  position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:6px;
  z-index:2;opacity:.5;
  animation:hintBob 2s ease-in-out infinite;
}
.scroll-hint span{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.25em;color:var(--ivory);text-transform:uppercase;}
.scroll-hint-arrow{width:16px;height:16px;border-right:1.5px solid var(--ivory);border-bottom:1.5px solid var(--ivory);transform:rotate(45deg);}
@keyframes hintBob{
  0%,100%{transform:translateX(-50%) translateY(0)}
  50%{transform:translateX(-50%) translateY(6px)}
}

/* ════════════════════════════════════
   SIGNUP MODAL
════════════════════════════════════ */
.signup-overlay{
  position:fixed;inset:0;z-index:500;
  display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.88);backdrop-filter:blur(10px);
  opacity:0;pointer-events:none;
  transition:opacity .4s ease;
}
.signup-overlay.open{opacity:1;pointer-events:all;}

.signup-modal{
  position:relative;width:520px;max-width:95vw;
  background:var(--black);
  border:1px solid rgba(201,168,76,.25);
  border-radius:24px;overflow:hidden;
  transform:translateY(32px) scale(.97);
  transition:transform .45s cubic-bezier(.34,1.26,.64,1);
}
.signup-overlay.open .signup-modal{transform:translateY(0) scale(1);}

/* top gold bar */
.signup-modal-bar{
  height:4px;
  background:linear-gradient(90deg,var(--gold-dim),var(--gold),var(--gold-light),var(--gold));
  background-size:200% 100%;
  animation:barShimmer 3s linear infinite;
}
@keyframes barShimmer{
  0%{background-position:100% 0}100%{background-position:-100% 0}
}

.signup-modal-body{padding:36px 40px 40px;}

/* badge */
.signup-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);
  color:var(--gold);padding:6px 14px;border-radius:100px;
  font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;
  margin-bottom:20px;
}
.signup-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulseDot 1.5s ease-in-out infinite;}
@keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

.signup-modal-body h2{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(28px,5vw,40px);font-weight:300;line-height:1.1;
  margin-bottom:10px;
}
.signup-modal-body h2 em{font-style:italic;color:var(--gold);}
.signup-modal-body p{color:var(--grey);font-size:13px;line-height:1.7;margin-bottom:28px;}

/* discount pill */
.discount-pill{
  display:flex;align-items:center;gap:12px;
  background:rgba(201,168,76,.07);border:1px dashed rgba(201,168,76,.35);
  border-radius:14px;padding:14px 18px;margin-bottom:28px;
}
.discount-pct{
  font-family:'Cormorant Garamond',serif;
  font-size:40px;font-weight:700;color:var(--gold);line-height:1;
  flex-shrink:0;
}
.discount-text h4{
  font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.15em;
  text-transform:uppercase;color:var(--ivory);margin-bottom:3px;
}
.discount-text p{font-size:11px;color:var(--grey);margin:0;}

/* form fields */
.signup-form{display:flex;flex-direction:column;gap:12px;}
.signup-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.signup-field{display:flex;flex-direction:column;gap:5px;}
.signup-label{
  font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.22em;
  color:var(--gold);text-transform:uppercase;
}
.signup-input{
  background:rgba(255,255,255,.04);
  border:1.5px solid rgba(201,168,76,.18);
  color:var(--ivory);padding:12px 16px;
  font-family:'Inter',sans-serif;font-size:13px;
  outline:none;border-radius:10px;
  transition:border-color .25s,background .25s;width:100%;
}
.signup-input::placeholder{color:var(--grey-light);}
.signup-input:focus{border-color:var(--gold);background:rgba(201,168,76,.05);}
.signup-input.error{border-color:var(--danger);animation:shake .35s ease;}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}

/* checkboxes */
.signup-checks{display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.signup-check{display:flex;align-items:flex-start;gap:10px;cursor:pointer;}
.signup-check input{display:none;}
.signup-check-box{
  width:18px;height:18px;border-radius:5px;flex-shrink:0;margin-top:1px;
  border:1.5px solid rgba(201,168,76,.3);
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;background:transparent;
}
.signup-check input:checked ~ .signup-check-box{background:var(--gold);border-color:var(--gold);}
.signup-check-box::after{content:'✓';font-size:10px;color:var(--black);opacity:0;transition:opacity .15s;}
.signup-check input:checked ~ .signup-check-box::after{opacity:1;}
.signup-check-label{font-size:11px;color:var(--grey);line-height:1.5;user-select:none;}
.signup-check-label strong{color:var(--ivory);}

/* submit button */
.signup-submit{
  position:relative;overflow:hidden;
  background:var(--gold);color:var(--black);
  font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;
  padding:16px;border:none;cursor:pointer;border-radius:12px;width:100%;
  margin-top:8px;transition:all .3s;
}
.signup-submit:hover{background:var(--gold-light);transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,168,76,.3);}
.signup-submit:active{transform:scale(.98);}
.signup-submit.loading{pointer-events:none;opacity:.8;}
.signup-submit-text{transition:opacity .2s;}
.signup-spinner{display:none;width:16px;height:16px;border:2px solid rgba(0,0,0,.2);border-top-color:var(--black);border-radius:50%;animation:spin .6s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg)}}
.signup-submit.loading .signup-submit-text{opacity:0;position:absolute;}
.signup-submit.loading .signup-spinner{display:block;}

.signup-privacy{font-size:10px;color:var(--grey-light);text-align:center;margin-top:8px;line-height:1.5;}

/* success state */
.signup-success{
  display:none;text-align:center;padding:20px 0 8px;
  animation:fadeIn .5s ease;
}
.signup-success-icon{
  width:72px;height:72px;border-radius:50%;
  background:rgba(201,168,76,.1);border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;font-size:28px;
}
.signup-success h3{
  font-family:'Cormorant Garamond',serif;
  font-size:28px;font-weight:300;margin-bottom:8px;
}
.signup-success h3 em{font-style:italic;color:var(--gold);}
.signup-success p{color:var(--grey);font-size:13px;line-height:1.7;margin-bottom:6px;}
.signup-coupon{
  font-family:'Space Mono',monospace;font-size:18px;letter-spacing:.3em;
  color:var(--gold);background:rgba(201,168,76,.1);
  border:1.5px dashed var(--gold);padding:14px 24px;
  border-radius:12px;display:inline-block;margin:16px 0;
  cursor:pointer;transition:all .2s;
}
.signup-coupon:hover{background:rgba(201,168,76,.15);}
.signup-coupon-hint{font-size:10px;color:var(--grey);letter-spacing:.1em;}
.signup-close-btn{
  margin-top:20px;background:none;
  border:1.5px solid rgba(201,168,76,.25);color:var(--gold);
  font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;
  padding:10px 24px;border-radius:100px;cursor:pointer;transition:all .2s;
}
.signup-close-btn:hover{background:var(--gold);color:var(--black);}

/* modal close X */
.signup-x{
  position:absolute;top:14px;right:14px;
  background:rgba(245,240,232,.1);
  border:1.5px solid rgba(245,240,232,.2);
  color:var(--ivory);cursor:pointer;font-size:15px;font-weight:700;
  width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s;z-index:10;
  box-shadow:0 2px 12px rgba(0,0,0,.4);
}
.signup-x:hover{background:rgba(245,240,232,.2);border-color:rgba(245,240,232,.5);transform:rotate(90deg) scale(1.1);}
.signup-x:active{transform:rotate(90deg) scale(.92);}

/* skip link below form */
.signup-skip{
  text-align:center;margin-top:10px;
}
.signup-skip button{
  background:none;border:none;cursor:pointer;
  font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.18em;
  color:var(--grey);text-transform:uppercase;text-decoration:underline;
  text-underline-offset:3px;padding:6px 12px;
  transition:color .2s;border-radius:100px;
}
.signup-skip button:hover{color:var(--ivory);}


/* floating trigger badge */
.signup-trigger{
  position:fixed;bottom:24px;right:24px;z-index:200;
  display:flex;align-items:center;gap:8px;
  background:var(--gold);color:var(--black);
  font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;
  padding:11px 20px;border-radius:100px;border:none;cursor:pointer;
  box-shadow:0 6px 28px rgba(201,168,76,.45);
  transition:all .3s;
  animation:triggerFloat 3.5s ease-in-out infinite;
}
.signup-trigger:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 12px 36px rgba(201,168,76,.55);}
.signup-trigger:active{transform:scale(.96);}
.signup-trigger.hide{opacity:0;pointer-events:none;transform:translateY(20px);}
.trigger-icon{font-size:13px;}
.trigger-pct{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;color:var(--black);line-height:1;}
@keyframes triggerFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-5px)}
}
  50%{transform:translateY(-4px)}
}
.trigger-icon{font-size:14px;}
.trigger-pct{
  font-family:'Cormorant Garamond',serif;
  font-size:18px;font-weight:700;color:var(--black);
}

/* ════════════════════════════════════
   RESPONSIVE
════════════════════════════════════ */

/* ── Tablet (max 1024px) ── */
@media(max-width:1024px){
  .products-grid{grid-template-columns:repeat(3,1fr);}
  .shop-header{padding:48px 32px 36px;}
  .products-section{padding:44px 32px;}
}

/* ── Mobile (max 768px) ── */
@media(max-width:768px){
  /* Landing */
  #page-landing{padding:0 16px;}
  .landing-logo{font-size:clamp(48px,17vw,96px);letter-spacing:.04em;}
  .landing-tagline{font-size:10px;letter-spacing:.2em;margin-bottom:40px;}
  .landing-buttons{flex-direction:column;align-items:center;gap:12px;width:100%;}
  .land-btn{width:100%;max-width:340px;padding:22px 28px;border-radius:16px;}
  .land-btn-title{font-size:26px;}
  .scroll-hint{display:none;}

  /* Shop nav */
  .shop-nav{padding:13px 16px;}
  .shop-nav-logo{font-size:17px;letter-spacing:.18em;}
  .back-btn{padding:8px 14px;font-size:9px;}
  .cart-btn{padding:8px 13px;font-size:10px;}

  /* Shop header */
  .shop-header{padding:32px 16px 24px;}
  .shop-title{font-size:clamp(32px,9vw,52px);}

  /* Products */
  .products-section{padding:28px 16px;}
  .filter-bar{gap:6px;}
  .filter-btn{padding:7px 14px;font-size:8px;}
  .products-grid{grid-template-columns:repeat(2,1fr);gap:12px;}
  .product-name{font-size:16px;}
  .product-price{font-size:12px;}
  .add-cart-btn{padding:7px 11px;font-size:8px;}
  .size-btn{padding:5px 10px;font-size:9px;}

  /* Cart drawer */
  .cart-drawer{width:100%;border-radius:var(--radius-lg) var(--radius-lg) 0 0;top:auto;height:90vh;}
  .cart-header{padding:18px 20px;}
  .cart-items{padding:14px 20px;}
  .cart-footer{padding:14px 20px;}

  /* Payment modal */
  .modal{
    width:100%;max-width:100vw;
    border-radius:var(--radius-lg) var(--radius-lg) 0 0;
    position:fixed;bottom:0;left:0;right:0;
    max-height:92vh;
  }
  .modal-header{padding:22px 20px 0;}
  .modal-body{padding:18px 20px 28px;}
  .pay-method-card{padding:14px 16px;}
  .pay-method-icon{width:38px;height:38px;}
  .wa-btn{font-size:10px;padding:13px 16px;}

  /* Signup modal */
  .signup-modal{
    width:100%;max-width:100vw;
    border-radius:var(--radius-lg) var(--radius-lg) 0 0;
    position:fixed;bottom:0;left:0;right:0;
    max-height:92vh;overflow-y:auto;
  }
  .signup-overlay{align-items:flex-end;}
  .signup-modal-body{padding:24px 20px 32px;}
  .signup-modal-body h2{font-size:26px;}
  .signup-row{grid-template-columns:1fr;}
  .discount-pct{font-size:32px;}
  .signup-x{top:10px;right:10px;width:34px;height:34px;}

  /* Floating trigger */
  .signup-trigger{bottom:16px;right:16px;padding:10px 16px;font-size:8px;}
  .trigger-pct{font-size:15px;}
}

/* ── Small mobile (max 380px) ── */
@media(max-width:380px){
  .landing-logo{font-size:clamp(40px,18vw,80px);}
  .products-grid{grid-template-columns:1fr 1fr;gap:10px;}
  .product-name{font-size:14px;}
  .land-btn-title{font-size:22px;}
}

/* Prevent iOS zoom on input focus */
@media(max-width:768px){
  input, select, textarea{font-size:16px !important;}
}

</style>
